<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBANSERVICE | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f1f5f9; padding:40px;">
    <h1>Admin Dashboard</h1>
    
    <div style="background:white; padding:20px; border-radius:15px; margin-bottom:30px;">
        <h2>Service Appointments</h2>
        <table id="bTable" style="width:100%; text-align:left;">
            <thead><tr><th>Name</th><th>Service</th><th>Phone</th><th>Address</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div style="background:white; padding:20px; border-radius:15px;">
        <h2>Job Applications</h2>
        <table id="aTable" style="width:100%; text-align:left;">
            <thead><tr><th>Name</th><th>Skill</th><th>Phone</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function fetchAdmin() {
            const resB = await fetch('/api/admin/bookings');
            const bookings = await resB.json();
            document.querySelector("#bTable tbody").innerHTML = bookings.map(b => 
                `<tr><td>${b.name}</td><td>${b.service}</td><td>${b.phone}</td><td>${b.address}</td></tr>`
            ).join('');

            const resA = await fetch('/api/admin/applications');
            const apps = await resA.json();
            document.querySelector("#aTable tbody").innerHTML = apps.map(a => 
                `<tr><td>${a.name}</td><td>${a.service}</td><td>${a.phone}</td><td>Active</td></tr>`
            ).join('');
        }
        window.onload = fetchAdmin;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANSERVICE | Premium Home Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar"><div class="logo">URBAN<span>SERVICE</span></div></nav>
    
    <header class="hero">
        <h1>Expert home services at your doorstep.</h1>
        <a href="#services" class="btn-primary">View All Services</a>
    </header>

    <div class="container">
        <section id="services" class="services-grid">
            <div class="service-card" onclick="selectService('Home Cleaning')">
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400" alt="Cleaning">
                <h3>Home Cleaning</h3>
                <p>Deep cleaning & sanitation</p>
            </div>
            <div class="service-card" onclick="selectService('Home Salon')">
                <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=400" alt="Salon">
                <h3>Home Salon</h3>
                <p>Spa, Hair & Facials</p>
            </div>
            <div class="service-card" onclick="selectService('Cooking Services')">
                <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=400" alt="Cooking">
                <h3>Cooking Services</h3>
                <p>Expert Chefs for your kitchen</p>
            </div>
            <div class="service-card" onclick="selectService('AC Repair')">
                <img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?w=400" alt="AC">
                <h3>AC Repair</h3>
                <p>Servicing & Installation</p>
            </div>
        </section>

        </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
